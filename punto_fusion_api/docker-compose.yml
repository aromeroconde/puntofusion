services:
  punto-fusion-api:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - AGENDADOR_API_URL=${AGENDADOR_API_URL}
      - AGENDADOR_API_KEY=${AGENDADOR_API_KEY}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.puntofusion.rule=Host(`puntofusion.smartnexo.com`)"
        - "traefik.http.services.puntofusion.loadbalancer.server.port=3000"
        - "traefik.http.routers.puntofusion.service=puntofusion"
        - "traefik.http.routers.puntofusion.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.puntofusion.entrypoints=websecure"
        - "traefik.http.routers.puntofusion.tls=true"
    networks:
      - general_network

networks:
  general_network:
    external: true
    name: general_network
