services:
  punto-fusion-api:
    image: puntofusion-api:v1
    env_file:
      - /home/adminops/puntofusion/.env
    environment:
      - NODE_ENV=production
      - PORT=3100
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.pf-api.rule=Host(`puntofusion.smartnexo.com`) && PathPrefix(`/api`)"
        - "traefik.http.routers.pf-api.entrypoints=websecure"
        - "traefik.http.routers.pf-api.tls=true"
        - "traefik.http.routers.pf-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.pf-api.loadbalancer.server.port=3100"
    networks:
      - general_network

  punto-fusion-web:
    image: puntofusion-web:v1
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.puntofusion-web.rule=Host(`puntofusion.smartnexo.com`)"
        - "traefik.http.services.puntofusion-web.loadbalancer.server.port=80"
        - "traefik.http.routers.puntofusion-web.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.puntofusion-web.entrypoints=websecure"
        - "traefik.http.routers.puntofusion-web.tls=true"
    networks:
      - general_network

networks:
  general_network:
    external: true
