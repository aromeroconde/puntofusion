services:
  punto-fusion-api:
    build: ./punto_fusion_api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3100
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - AGENDADOR_API_URL=${AGENDADOR_API_URL}
      - ALEGRA_USER=${ALEGRA_USER}
      - ALEGRA_TOKEN=${ALEGRA_TOKEN}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.puntofusion-api.rule=Host(`puntofusion.smartnexo.com`) && PathPrefix(`/api`)"
        - "traefik.http.services.puntofusion-api.loadbalancer.server.port=3100"
        - "traefik.http.routers.puntofusion-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.puntofusion-api.entrypoints=websecure"
        - "traefik.http.routers.puntofusion-api.tls=true"
    networks:
      - general_network

  punto-fusion-web:
    build: ./punto_fusion_web
    restart: always
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.puntofusion-web.rule=Host(`puntofusion.smartnexo.com`)"
        - "traefik.http.services.puntofusion-web.loadbalancer.server.port=80"
        - "traefik.http.routers.puntofusion-web.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.puntofusion-web.entrypoints=websecure"
        - "traefik.http.routers.puntofusion-web.tls=true"
    networks:
      - general_network

networks:
  general_network:
    external: true
